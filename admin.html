
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CANB 관리자</title>
<style>
  :root{
    /* CANB 브랜드 — 차콜 베이스 + 마젠타 포인트, 틸/앰버 소량 */
    --magenta:#C1147E; --magenta-d:#9e1066; --magenta-bg:#fbe8f2;
    --teal:#0CA9B0; --teal-d:#0a8e94; --teal-bg:#e3f5f6;
    --amber:#F2A900; --amber-d:#c98c00; --amber-bg:#fdf3da;
    /* 차콜 헤더 */
    --navy:#2b2d33; --navy-deep:#1c1e22;
    --ink:#23252b;
    /* 키컬러 역할 매핑(기존 클래스 호환용) */
    --lime:#0CA9B0; --lime-bg:#e3f5f6;            /* '완료/가능' = 틸 */
    --red:#d8475f; --red-bg:#fbe6ea;
    --lock:#9aa3b8; --lock-bg:#eef1f4;
    --bg:#f5f6f8; --card:#fff; --line:#e6e8ec; --muted:#6b7079;
    --shadow:0 1px 2px rgba(30,30,40,.05),0 6px 20px rgba(30,30,40,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5; -webkit-font-smoothing:antialiased}
  button{font-family:inherit; cursor:pointer; border:none}
  button:disabled{cursor:not-allowed; opacity:.6}
  .wrap{max-width:1060px; margin:0 auto; padding:26px 18px 80px}

  /* 로그인 */
  .login-bg{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    background:linear-gradient(135deg,#2b2d33,#1c1e22)}
  .login-card{width:100%; max-width:380px; background:#fff; border-radius:18px; padding:34px 30px 30px; box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .login-card .eyebrow{font-size:11px; letter-spacing:.16em; color:var(--magenta); text-transform:uppercase; font-weight:700}
  .login-card h1{margin:6px 0 2px; font-size:21px; color:var(--ink); font-weight:800}
  .login-card p.lead{margin:0 0 22px; font-size:13.5px; color:var(--muted)}
  .field{margin-bottom:14px}
  .field label{display:block; font-size:12.5px; font-weight:600; margin-bottom:6px}
  .field input{width:100%; border:1px solid var(--line); border-radius:10px; padding:11px 13px; font-size:14px; outline:none; font-family:inherit}
  .field input:focus{border-color:var(--magenta); box-shadow:0 0 0 3px rgba(193,20,126,.12)}
  .login-btn{width:100%; margin-top:6px; background:var(--magenta); color:#fff; font-weight:700; font-size:15px; padding:12px; border-radius:11px}
  .login-btn:hover{background:var(--magenta-d)}
  .login-err{display:none; margin-top:14px; background:var(--red-bg); border:1px solid #f0c4cd; color:#9c2740; border-radius:10px; padding:10px 13px; font-size:13px}
  .login-err.show{display:block}

  /* 헤더 */
  header.top{background:var(--navy); color:#fff; border-radius:16px;
    padding:20px 24px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap}
  header.top .brand{display:flex; align-items:center; gap:14px}
  header.top .brand .logo{flex:none}
  header.top h1{margin:0; font-size:20px; font-weight:800}
  header.top .eyebrow{font-size:11px; letter-spacing:.14em; color:var(--magenta); text-transform:uppercase; font-weight:700}
  header.top .who{font-size:13px; color:#b9bbc0; margin-top:2px}
  .logout{background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.22); color:#e8e9ec; font-size:12px; font-weight:600; padding:7px 13px; border-radius:8px}
  .logout:hover{background:rgba(255,255,255,.2); color:#fff}

  /* 탭 (super 전용) */
  .tabs{display:flex; gap:8px; margin:22px 2px 4px}
  .tab{background:var(--lock-bg); color:var(--ink); font-size:13px; font-weight:700; padding:9px 16px; border-radius:9px}
  .tab.active{background:var(--magenta); color:#fff}

  .bar{display:flex; align-items:center; justify-content:space-between; margin:24px 2px 12px; gap:10px; flex-wrap:wrap}
  .bar h2{margin:0; font-size:16px; color:var(--navy); font-weight:800}
  .bar .sub{font-size:12.5px; color:var(--muted)}
  .refresh{background:var(--lock-bg); color:var(--navy); font-size:12.5px; font-weight:600; padding:7px 13px; border-radius:8px}

  /* 예약 카드 */
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); padding:16px 18px; margin-bottom:12px}
  .card.pending{border-left:4px solid var(--amber)}
  .card.done{border-left:4px solid var(--lime)}
  .row1{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap}
  .tname{font-size:15px; font-weight:800; color:var(--ink)}
  .meta{font-size:12.5px; color:var(--muted); margin-top:3px}
  .badge{font-size:11px; font-weight:700; padding:3px 10px; border-radius:99px; white-space:nowrap}
  .b-pending{background:var(--amber-bg); color:var(--amber)}
  .b-done{background:var(--lime-bg); color:var(--lime)}
  .form{display:grid; grid-template-columns:150px 1fr 150px auto; gap:10px; align-items:end; margin-top:14px}
  .form label{display:block; font-size:11.5px; color:var(--muted); font-weight:600; margin-bottom:5px}
  .form select, .form input{width:100%; border:1px solid var(--line); border-radius:9px; padding:9px 11px; font-size:13.5px; font-family:inherit; outline:none}
  .form select:focus, .form input:focus{border-color:var(--teal)}
  /* 평가 입력 폼 (4항목 textarea) */
  .eform{margin-top:14px; border-top:1px solid var(--line); padding-top:14px}
  .eform .frow{display:grid; grid-template-columns:170px 1fr; gap:12px; align-items:start; margin-bottom:10px}
  .eform label{font-size:12px; color:var(--navy); font-weight:700; padding-top:9px}
  .eform label .en{display:block; font-size:10.5px; color:var(--muted); font-weight:500}
  .eform select, .eform input, .eform textarea{width:100%; border:1px solid var(--line); border-radius:9px; padding:9px 11px; font-size:13.5px; font-family:inherit; outline:none; resize:vertical}
  .eform select:focus, .eform input:focus, .eform textarea:focus{border-color:var(--teal); box-shadow:0 0 0 3px rgba(11,184,207,.1)}
  .eform textarea{min-height:62px; line-height:1.5}
  .eform .erow-save{display:flex; justify-content:flex-end; gap:10px; align-items:center; margin-top:4px}
  @media (max-width:680px){ .eform .frow{grid-template-columns:1fr; gap:4px} .eform label{padding-top:0} }
  .save{background:var(--magenta); color:#fff; font-weight:700; font-size:13.5px; padding:10px 18px; border-radius:9px; white-space:nowrap}
  .save:hover{background:var(--magenta-d)}
  @media (max-width:680px){ .form{grid-template-columns:1fr 1fr} .save{grid-column:1 / -1} }

  /* 이수 현황 표 */
  .tablecard{background:var(--card); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); overflow:hidden}
  .ttable{width:100%; border-collapse:collapse; font-size:13px}
  .ttable th{background:#f7f7f9; color:var(--ink); font-weight:700; text-align:left; padding:11px 14px; border-bottom:1px solid var(--line); white-space:nowrap}
  .ttable td{padding:11px 14px; border-bottom:1px solid var(--line); vertical-align:middle}
  .ttable tr:last-child td{border-bottom:none}
  .ttable tbody tr:hover{background:#fafbfe}
  .tnum{font-variant-numeric:tabular-nums}
  .prog{display:flex; align-items:center; gap:8px; min-width:130px}
  .pbar{flex:1; height:7px; background:var(--lock-bg); border-radius:99px; overflow:hidden}
  .pfill{height:100%; background:var(--teal); border-radius:99px}
  .chip{font-size:11px; font-weight:700; padding:2px 9px; border-radius:99px}
  .chip-y{background:var(--lime-bg); color:var(--lime)}
  .chip-n{background:var(--lock-bg); color:var(--lock)}
  .small{font-size:11.5px; color:var(--muted)}
  @media (max-width:680px){ .col-hide{display:none} }

  .state{padding:54px 20px; text-align:center; color:var(--muted)}
  .spinner{width:30px; height:30px; border:3px solid var(--line); border-top-color:var(--teal); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{background:#fff; border:1px dashed var(--line); border-radius:12px; padding:36px; text-align:center; color:var(--muted)}
  .err{background:var(--red-bg); border:1px solid #f0c4cd; color:#9c2740; border-radius:12px; padding:18px 20px}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:12px 20px; border-radius:10px; font-size:13.5px; box-shadow:0 8px 30px rgba(0,0,0,.25); opacity:0; pointer-events:none; transition:.25s; z-index:60}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .toast.bad{background:var(--red)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
  :focus-visible{outline:2px solid var(--teal); outline-offset:2px}
</style>
</head>
<body>
<div id="app"><div class="state"><div class="spinner"></div>불러오는 중…</div></div>
<div class="toast" id="toast"></div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbytP0kq6WFnXyqL14wDQQaP9LyVnfmSTrtqb9wa2WGRPtyoOdHKc-bUs4iRyjsH6zlMpA/exec";
const RESULT_OPTIONS = ["우수", "양호", "보통", "재평가"];

let AUTH = null;   // { email, password, name, role, campus }
let VIEW = "status";   // super일 때 현재 탭: "status" | "results"
const SK = "canb_admin_session";
let _mem = null;
function saveSession(s){ try{ sessionStorage.setItem(SK, JSON.stringify(s)); }catch(e){} _mem=s; }
function readSession(){ try{ var r=sessionStorage.getItem(SK); if(r) return JSON.parse(r); }catch(e){} return _mem; }
function clearSession(){ try{ sessionStorage.removeItem(SK); }catch(e){} _mem=null; }

async function api(params){
  const u = new URL(WEBAPP_URL);
  Object.entries(params).forEach(([k,v]) => u.searchParams.set(k, v));
  const res = await fetch(u.toString(), { method:"GET" });
  if(!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

function init(){
  const s = readSession();
  if(s && s.email){ AUTH = s; routeHome(); }
  else showLogin();
}

/* 로그인 (super + campus 허용) */
function showLogin(){
  clearSession(); AUTH = null;
  document.getElementById("app").innerHTML = `
  <div class="login-bg"><div class="login-card">
    <svg width="64" height="30" viewBox="0 0 3228 1514" xmlns="http://www.w3.org/2000/svg" fill="var(--magenta)" fill-rule="evenodd" aria-label="CANB" style="margin-bottom:14px">
        <path d="M2849.0,1512.5 L2823.5,1512.0 L2824.0,0.5 L2861.0,1.5 L2897.0,6.5 L2968.0,26.5 L3038.0,61.5 L3100.0,109.5 L3150.5,167.0 L3188.5,231.0 L3213.5,299.0 L3221.5,336.0 L3226.5,381.0 L3225.5,440.0 L3218.5,487.0 L3202.5,543.0 L3179.5,594.0 L3153.5,636.0 L3119.5,678.0 L3071.0,722.5 L3019.5,756.0 L3076.0,794.5 L3127.5,844.0 L3165.5,895.0 L3200.5,965.0 L3218.5,1026.0 L3226.5,1087.0 L3226.5,1132.0 L3222.5,1171.0 L3203.5,1246.0 L3180.5,1298.0 L3153.5,1342.0 L3118.5,1385.0 L3067.0,1431.5 L3014.0,1465.5 L2963.0,1488.5 L2903.0,1505.5 L2849.0,1512.5 Z"/>
        <path d="M2621.0,1159.5 L2219.0,757.5 L1815.0,1159.5 L1814.5,749.0 L1819.5,692.0 L1830.5,643.0 L1852.5,585.0 L1882.5,532.0 L1917.5,487.0 L1948.0,456.5 L1980.0,430.5 L2015.0,407.5 L2054.0,387.5 L2125.0,363.5 L2193.0,353.5 L2244.0,353.5 L2281.0,357.5 L2358.0,377.5 L2387.0,389.5 L2433.0,414.5 L2494.0,461.5 L2536.5,508.0 L2570.5,559.0 L2598.5,620.0 L2614.5,678.0 L2621.5,734.0 L2621.0,1159.5 Z"/>
        <path d="M1663.0,1159.5 L857.5,1159.0 L1260.0,353.5 L1663.0,1159.5 Z"/>
        <path d="M0.0,748.5 L1.5,715.0 L10.5,662.0 L24.5,616.0 L37.5,585.0 L74.5,522.0 L102.5,487.0 L133.0,456.5 L190.0,413.5 L253.0,381.5 L329.0,359.5 L365.0,354.5 L403.0,353.5 L403.5,756.0 L806.0,756.5 L806.5,779.0 L796.5,849.0 L783.5,893.0 L769.5,927.0 L745.5,971.0 L725.5,1000.0 L699.5,1031.0 L668.0,1061.5 L605.0,1106.5 L535.0,1138.5 L497.0,1149.5 L452.0,1157.5 L376.0,1159.5 L334.0,1154.5 L294.0,1145.5 L230.0,1121.5 L169.0,1085.5 L134.0,1057.5 L102.5,1026.0 L58.5,967.0 L27.5,905.0 L13.5,863.0 L5.5,827.0 L0.0,764.5 Z"/>
      </svg>
    <div class="eyebrow">CANB Admin</div>
    <h1>관리자 로그인</h1>
    <p class="lead">총괄 또는 캠퍼스 관리자 계정으로 로그인하세요.</p>
    <div class="field"><label for="le">이메일</label>
      <input id="le" type="email" autocomplete="username" placeholder="name@example.com"
        onkeydown="if(event.key==='Enter')document.getElementById('lp').focus()"></div>
    <div class="field"><label for="lp">비밀번호</label>
      <input id="lp" type="password" autocomplete="current-password" placeholder="비밀번호"
        onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" id="lb" onclick="doLogin()">로그인</button>
    <div class="login-err" id="lerr"></div>
  </div></div>`;
  setTimeout(()=>{ var e=document.getElementById("le"); if(e) e.focus(); }, 50);
}
function loginErr(m){ var el=document.getElementById("lerr"); if(el){ el.textContent=m; el.classList.add("show"); } }

async function doLogin(){
  const email=(document.getElementById("le").value||"").trim();
  const pw=document.getElementById("lp").value||"";
  const btn=document.getElementById("lb");
  document.getElementById("lerr").classList.remove("show");
  if(!email||!pw){ loginErr("이메일과 비밀번호를 입력하세요."); return; }
  btn.disabled=true; btn.textContent="확인 중…";
  try{
    const r = await api({ action:"login", email, password:pw });
    if(!r || !r.ok){ loginErr((r&&r.message)||"로그인 정보가 올바르지 않습니다."); btn.disabled=false; btn.textContent="로그인"; return; }
    if(r.role !== "super" && r.role !== "campus"){ loginErr("이 페이지는 관리자 전용입니다."); btn.disabled=false; btn.textContent="로그인"; return; }
    AUTH = { email, password:pw, name:r.teacherName || "", role:r.role, campus:r.campus || "" };
    saveSession(AUTH);
    routeHome();
  }catch(e){
    loginErr("서버에 연결하지 못했습니다. 잠시 후 다시 시도해 주세요.");
    btn.disabled=false; btn.textContent="로그인"; console.error(e);
  }
}
function logout(){ clearSession(); AUTH=null; VIEW="status"; showLogin(); }

/* 로그인 후 진입: campus는 항상 현황, super는 마지막 탭(기본 현황) */
function routeHome(){
  if(AUTH.role === "super"){ if(VIEW==="results") loadReservations(); else loadStatus(); }
  else loadStatus();   // campus
}
function switchTab(v){ VIEW=v; routeHome(); }

/* 공통 헤더 + (super) 탭 */
function chrome(activeView){
  const roleLabel = AUTH.role==="super" ? "총괄 관리자" : "캠퍼스 관리자";
  const tabs = AUTH.role==="super" ? `
    <div class="tabs">
      <button class="tab ${activeView==='status'?'active':''}" onclick="switchTab('status')">이수 현황</button>
      <button class="tab ${activeView==='results'?'active':''}" onclick="switchTab('results')">결과 기입</button>
    </div>` : "";
  return `
    <header class="top">
      <div class="brand">
        <svg width="58" height="27" viewBox="0 0 3228 1514" xmlns="http://www.w3.org/2000/svg" fill="var(--magenta)" fill-rule="evenodd" aria-label="CANB">
        <path d="M2849.0,1512.5 L2823.5,1512.0 L2824.0,0.5 L2861.0,1.5 L2897.0,6.5 L2968.0,26.5 L3038.0,61.5 L3100.0,109.5 L3150.5,167.0 L3188.5,231.0 L3213.5,299.0 L3221.5,336.0 L3226.5,381.0 L3225.5,440.0 L3218.5,487.0 L3202.5,543.0 L3179.5,594.0 L3153.5,636.0 L3119.5,678.0 L3071.0,722.5 L3019.5,756.0 L3076.0,794.5 L3127.5,844.0 L3165.5,895.0 L3200.5,965.0 L3218.5,1026.0 L3226.5,1087.0 L3226.5,1132.0 L3222.5,1171.0 L3203.5,1246.0 L3180.5,1298.0 L3153.5,1342.0 L3118.5,1385.0 L3067.0,1431.5 L3014.0,1465.5 L2963.0,1488.5 L2903.0,1505.5 L2849.0,1512.5 Z"/>
        <path d="M2621.0,1159.5 L2219.0,757.5 L1815.0,1159.5 L1814.5,749.0 L1819.5,692.0 L1830.5,643.0 L1852.5,585.0 L1882.5,532.0 L1917.5,487.0 L1948.0,456.5 L1980.0,430.5 L2015.0,407.5 L2054.0,387.5 L2125.0,363.5 L2193.0,353.5 L2244.0,353.5 L2281.0,357.5 L2358.0,377.5 L2387.0,389.5 L2433.0,414.5 L2494.0,461.5 L2536.5,508.0 L2570.5,559.0 L2598.5,620.0 L2614.5,678.0 L2621.5,734.0 L2621.0,1159.5 Z"/>
        <path d="M1663.0,1159.5 L857.5,1159.0 L1260.0,353.5 L1663.0,1159.5 Z"/>
        <path d="M0.0,748.5 L1.5,715.0 L10.5,662.0 L24.5,616.0 L37.5,585.0 L74.5,522.0 L102.5,487.0 L133.0,456.5 L190.0,413.5 L253.0,381.5 L329.0,359.5 L365.0,354.5 L403.0,353.5 L403.5,756.0 L806.0,756.5 L806.5,779.0 L796.5,849.0 L783.5,893.0 L769.5,927.0 L745.5,971.0 L725.5,1000.0 L699.5,1031.0 L668.0,1061.5 L605.0,1106.5 L535.0,1138.5 L497.0,1149.5 L452.0,1157.5 L376.0,1159.5 L334.0,1154.5 L294.0,1145.5 L230.0,1121.5 L169.0,1085.5 L134.0,1057.5 L102.5,1026.0 L58.5,967.0 L27.5,905.0 L13.5,863.0 L5.5,827.0 L0.0,764.5 Z"/>
      </svg>
        <div>
          <div class="eyebrow">CANB Admin</div>
          <h1>${AUTH.role==="super" ? "관리자 콘솔" : "캠퍼스 이수 현황"}</h1>
          <div class="who">${esc(AUTH.name||AUTH.email)} · ${roleLabel}${AUTH.role==="campus"&&AUTH.campus?(" · "+esc(AUTH.campus)):""}</div>
        </div>
      </div>
      <button class="logout" onclick="logout()">로그아웃</button>
    </header>
    ${tabs}`;
}

/* ===== 이수 현황 (campus/super 공용, 읽기 전용) ===== */
async function loadStatus(){
  document.getElementById("app").innerHTML = `<div class="wrap">${chrome("status")}<div class="state"><div class="spinner"></div>이수 현황을 불러오는 중…</div></div>`;
  try{
    const r = await api({ action:"campusStatus", email:AUTH.email, password:AUTH.password });
    if(!r || !r.ok){
      if(r && /권한/.test(r.message||"")){ logout(); return; }
      throw new Error((r&&r.message)||"불러오기 실패");
    }
    renderStatus(r);
  }catch(e){
    document.getElementById("app").innerHTML = `<div class="wrap">${chrome("status")}<div class="err"><b>이수 현황을 불러오지 못했습니다.</b><br><span style="color:#6b7488">${esc(String(e.message||e))}</span></div>
      <div style="margin-top:14px"><button class="logout" style="background:#eef1f4;color:var(--ink)" onclick="logout()">로그인으로</button></div></div>`;
    console.error(e);
  }
}

function renderStatus(r){
  const list = r.teachers || [];
  const total = r.total || 45;
  const scope = r.campus || (AUTH.campus || "");
  const rowsHtml = list.length ? list.map(t=>statusRow(t,total)).join("") :
    `<tr><td colspan="7"><div class="empty" style="border:none;padding:26px">${esc(r.message||"표시할 강사가 없습니다.")}</div></td></tr>`;

  document.getElementById("app").innerHTML = `
  <div class="wrap">
    ${chrome("status")}
    <div class="bar">
      <div>
        <h2>강사 이수 현황 ${scope?`<span class="small">· ${esc(scope)}</span>`:""}</h2>
        <span class="sub">전체 ${list.length}명 · 분모 ${total}개 기준 · 조회 ${esc(r.generatedAt||"")}</span>
      </div>
      <button class="refresh" onclick="loadStatus()">새로고침</button>
    </div>
    <div class="tablecard">
      <table class="ttable">
        <thead>
          <tr>
            <th>강사</th>
            <th class="col-hide">캠퍼스</th>
            <th>이수 진도</th>
            <th>샘플 시청</th>
            <th>평균점수</th>
            <th>예약</th>
            <th class="col-hide">마지막 갱신</th>
          </tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
    <p class="small" style="margin:12px 2px 0">
      · <b>이수 진도</b>는 영상·퀴즈·샘플·POND를 모두 끝낸 '완전 이수' 모듈 수입니다. 괄호 안은 퀴즈만 통과한 수입니다.<br>
      · <b>샘플 시청</b>은 퀴즈를 통과한 모듈에 등록된 샘플 영상 중 시청 완료한 수입니다. (시청 / 전체)<br>
      · 분모는 현재 전체 ${total}개 고정이며, 추후 한국인/원어민 담당 과목별 기준으로 분리 예정입니다.<br>
      · 데이터는 조회 시점(${esc(r.generatedAt||"")}) 기준 실시간 집계입니다.
    </p>
  </div>`;
}

function statusRow(t, total){
  const complete = Number(t.complete||0);
  const passed = Number(t.passed||0);
  const pct = total>0 ? Math.min(100, Math.round(complete/total*100)) : 0;
  const sw = Number(t.sampleWatched||0);
  const stot = Number(t.sampleTotal||0);
  const sampleCell = stot>0
    ? `<span class="tnum"><b>${sw}</b> / ${stot}</span>` + (sw>=stot ? ` <span class="chip chip-y">완료</span>` : "")
    : `<span class="small">없음</span>`;
  const book = t.bookingEligible
    ? `<span class="chip chip-y">가능</span>`
    : `<span class="chip chip-n">대기</span>`;
  return `
  <tr>
    <td><b>${esc(t.teacherName)}</b><br><span class="small">${esc(t.teacherId)}</span></td>
    <td class="col-hide">${esc(t.campus||"")}</td>
    <td>
      <div class="prog">
        <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
        <span class="tnum">${complete}/${total}</span>
      </div>
      <span class="small">퀴즈통과 ${passed} · POND ${Number(t.pond||0)}</span>
    </td>
    <td>${sampleCell}</td>
    <td class="tnum">${Number(t.avgScore||0)}</td>
    <td>${book}</td>
    <td class="col-hide small">${esc(t.lastUpdate||"-")}</td>
  </tr>`;
}

/* ===== 예약/결과 기입 (super 전용) ===== */
async function loadReservations(){
  document.getElementById("app").innerHTML = `<div class="wrap">${chrome("results")}<div class="state"><div class="spinner"></div>예약 목록을 불러오는 중…</div></div>`;
  try{
    const r = await api({ action:"getReservations", email:AUTH.email, password:AUTH.password });
    if(!r || !r.ok){
      if(r && /권한/.test(r.message||"")){ logout(); return; }
      throw new Error((r&&r.message)||"불러오기 실패");
    }
    if(r.adminName && !AUTH.name){ AUTH.name=r.adminName; saveSession(AUTH); }
    renderReservations(r.reservations || []);
  }catch(e){
    document.getElementById("app").innerHTML = `<div class="wrap">${chrome("results")}<div class="err"><b>예약 목록을 불러오지 못했습니다.</b><br><span style="color:#6b7488">${esc(String(e.message||e))}</span></div>
      <div style="margin-top:14px"><button class="logout" style="background:#eef1f4;color:var(--ink)" onclick="logout()">로그인으로</button></div></div>`;
    console.error(e);
  }
}

function isPending(result){
  var r=String(result||"");
  return !r || r.indexOf("예약완료")===0 || r.indexOf("대기")>=0;
}

function renderReservations(list){
  const pending = list.filter(x=>isPending(x.result)).length;
  const cards = list.length ? list.map(renderCard).join("") :
    `<div class="empty">아직 예약된 모의강의가 없습니다.</div>`;

  document.getElementById("app").innerHTML = `
  <div class="wrap">
    ${chrome("results")}
    <div class="bar">
      <div><h2>예약 목록</h2><span class="sub">미평가 ${pending}건 · 전체 ${list.length}건 (미평가가 위에 표시됩니다)</span></div>
      <button class="refresh" onclick="loadReservations()">새로고침</button>
    </div>
    ${cards}
  </div>`;
}

function renderCard(x){
  const pending = isPending(x.result);
  const rid = esc(x.reservationId);
  const opts = ['<option value="">결과 선택</option>']
    .concat(RESULT_OPTIONS.map(o=>`<option value="${o}"${x.result===o?' selected':''}>${o}</option>`)).join("");
  return `
  <div class="card ${pending?'pending':'done'}">
    <div class="row1">
      <div>
        <div class="tname">${esc(x.teacherName)} <span style="font-size:12px;color:#9aa3b8;font-weight:500">(${esc(x.teacherId)})</span></div>
        <div class="meta">${esc(x.when)} · ${esc(x.place)} · 예약ID ${rid}</div>
      </div>
      <span class="badge ${pending?'b-pending':'b-done'}">${pending?'미평가':esc(x.result)}</span>
    </div>
    <div class="eform">
      <div class="frow">
        <label>평가 결과</label>
        <select id="res-${rid}">${opts}</select>
      </div>
      <div class="frow">
        <label>주요 강점<span class="en">Strengths</span></label>
        <textarea id="st-${rid}" placeholder="예) POND 기반 활동이 자연스럽게 연결됨">${esc(x.strengths)}</textarea>
      </div>
      <div class="frow">
        <label>약점 및 개선 필요<span class="en">Weaknesses</span></label>
        <textarea id="wk-${rid}" placeholder="예) teacher talk 비중이 높아 학생 발화 기회 제한">${esc(x.weaknesses)}</textarea>
      </div>
      <div class="frow">
        <label>개선 방안<span class="en">Action Plan</span></label>
        <textarea id="ap-${rid}" placeholder="예) 확장 질문·full sentence 유도로 발화 기회 확대">${esc(x.actionPlan)}</textarea>
      </div>
      <div class="frow">
        <label>주요 특징<span class="en">Key Features</span></label>
        <input id="kf-${rid}" value="${esc(x.keyFeatures)}" placeholder="예) 에너지 중심 수업 / engagement 우수">
      </div>
      <div class="frow">
        <label>평가자</label>
        <input id="ev-${rid}" value="${esc(x.evaluator||AUTH.name||'')}">
      </div>
      <div class="erow-save">
        <button class="save" onclick="saveResult('${rid}', this)">저장</button>
      </div>
    </div>
  </div>`;
}

async function saveResult(rid, btn){
  const result = document.getElementById("res-"+rid).value;
  const strengths = document.getElementById("st-"+rid).value;
  const weaknesses = document.getElementById("wk-"+rid).value;
  const actionPlan = document.getElementById("ap-"+rid).value;
  const keyFeatures = document.getElementById("kf-"+rid).value;
  const evaluator = document.getElementById("ev-"+rid).value;
  if(!result){ toast("평가 결과를 선택하세요.", true); return; }

  btn.disabled=true; const t0=btn.textContent; btn.textContent="저장 중…";
  try{
    const r = await api({ action:"recordResult", email:AUTH.email, password:AUTH.password,
                          reservation:rid, result, evaluator,
                          strengths, weaknesses, actionPlan, keyFeatures });
    if(!r || !r.ok){
      if(r && /권한/.test(r.message||"")){ toast("권한이 없습니다. 다시 로그인하세요.", true); setTimeout(logout, 1200); return; }
      toast((r&&r.message)||"저장 실패", true); btn.disabled=false; btn.textContent=t0; return;
    }
    toast(result==="재평가" ? "저장 완료 — 재평가 안내 메일을 발송했습니다." : "저장 완료");
    await loadReservations();
  }catch(e){ toast("저장 중 오류가 발생했습니다.", true); btn.disabled=false; btn.textContent=t0; console.error(e); }
}

/* 유틸 */
function esc(s){ return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
let toastTimer;
function toast(msg, bad){
  const el=document.getElementById("toast");
  el.textContent=msg; el.className="toast show"+(bad?" bad":"");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className="toast"+(bad?" bad":""), 2800);
}

init();
</script>
</body>
</html>
